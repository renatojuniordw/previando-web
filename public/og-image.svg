<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2B8A"/>
      <stop offset="100%" style="stop-color:#1A47C8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#F5820A"/>
  <!-- Brand name -->
  <text x="80" y="120" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="64" fill="#FFFFFF">Previando</text>
  <!-- Tagline -->
  <text x="80" y="180" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="28" fill="#EEF2FF">Previdência inteligente para advogados</text>
  <!-- Main headline -->
  <text x="80" y="320" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="48" fill="#FFFFFF">Inteligência Previdenciária</text>
  <text x="80" y="380" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="48" fill="#F5820A">para Advogados</text>
  <!-- CTA text -->
  <text x="80" y="460" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="24" fill="#EEF2FF">Faça o upload do CNIS e receba o cálculo completo</text>
  <text x="80" y="500" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="24" fill="#EEF2FF">em minutos, não em horas.</text>
  <!-- Dashboard mockup placeholder -->
  <rect x="640" y="100" width="480" height="400" rx="16" fill="#EEF2FF" opacity="0.15"/>
  <rect x="670" y="130" width="420" height="60" rx="8" fill="#EEF2FF" opacity="0.1"/>
  <rect x="670" y="210" width="200" height="90" rx="8" fill="#F5820A" opacity="0.2"/>
  <rect x="890" y="210" width="200" height="90" rx="8" fill="#EEF2FF" opacity="0.1"/>
  <rect x="670" y="320" width="420" height="150" rx="8" fill="#EEF2FF" opacity="0.1"/>
  <!-- Footer -->
  <text x="80" y="580" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="18" fill="#EEF2FF" opacity="0.6">previando.com.br</text>
</svg>
