    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Preciso instalar alguma coisa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. O Previando roda direto no navegador, em qualquer computador. Sem instalação, sem configuração. Acesse de qualquer lugar."
          }
        },
        {
          "@type": "Question",
          "name": "Os cálculos são confiáveis juridicamente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Os cálculos seguem as fórmulas oficiais da legislação previdenciária, incluindo todas as regras de transição da EC 103/2019 e atualizações de teto e salário mínimo. O parecer da IA é um rascunho — o advogado sempre revisa."
          }
        },
        {
          "@type": "Question",
          "name": "Meus dados ficam seguros?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CPFs são armazenados de forma criptografada. PDFs são processados e armazenados em nuvem segura. Nenhum dado é compartilhado com terceiros. Servidor no Brasil."
          }
        },
        {
          "@type": "Question",
          "name": "Posso cancelar quando quiser?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Sem multa, sem fidelidade. Cancele pelo painel e o plano fica ativo até o fim do período pago."
          }
        },
        {
          "@type": "Question",
          "name": "E se a legislação mudar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O sistema é atualizado automaticamente. Quando há novas regras — novo teto, novas modalidades, novas tabelas — a atualização entra sem ação da sua parte. Cálculos antigos ficam preservados com a lei da época."
          }
        },
        {
          "@type": "Question",
          "name": "O que é o Portal do Cliente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "É um link que você envia para o cliente acompanhar o caso. Ele vê os valores calculados, documentos e pode simular cenários. Reduz em até 70% as ligações perguntando 'e o processo?'."
          }
        }
      ]
    }
    </script>
