server {
    listen 60001;
    server_name previando.com.br www.previando.com.br;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    include /etc/nginx/snippets/security-headers.conf;

    # Tudo que cai aqui é HTML pré-renderizado (ou robots/sitemap) — sem cache longo.
    # Assets versionados são capturados pelo location regex abaixo.
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    # HTML pré-renderizado não pode ficar em cache longo
    location ~* \.html$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
